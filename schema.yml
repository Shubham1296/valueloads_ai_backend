          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Call'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Call'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Call'
          description: ''
