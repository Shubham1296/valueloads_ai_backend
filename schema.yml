openapi: 3.0.3
info:
  title: Valueloads AI Backend API
  version: 1.0.0
  description: "\n    Complete voice AI agent platform API similar to ConversAI Labs.\n\
    \n    ## Features\n    - **Agents**: Manage AI voice agents with custom prompts\
    \ and behaviors\n    - **Leads**: Contact management with scheduling and custom\
    \ fields\n    - **Calls**: Call tracking with AI analysis and recordings\n   \
    \ - **Campaigns**: Group agents and track performance metrics\n    - **Webhooks**:\
    \ Real-time event notifications\n    - **Integrations**: Connect to CRMs (Salesforce,\
    \ HubSpot, etc.)\n    - **Analytics**: Pre-aggregated campaign statistics\n  \
    \  - **Exports**: Bulk data export to CSV/Excel\n\n    ## Authentication\n   \
    \ All endpoints require JWT Bearer token authentication (except docs).\n    Use\
    \ `/api/auth/token/` to obtain access tokens.\n    "
paths:
  /api/agent-versions/:
    get:
      operationId: agent_versions_list
      description: |-
        API endpoint for viewing agent versions.
        Read-only access to version history.
      parameters:
      - in: query
        name: agent
        schema:
          type: string
          format: uuid
      - in: query
        name: is_active
        schema:
          type: boolean
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      tags:
      - agent-versions
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AgentVersion'
          description: ''
  /api/agent-versions/{id}/:
    get:
      operationId: agent_versions_retrieve
      description: |-
        API endpoint for viewing agent versions.
        Read-only access to version history.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this agent version.
        required: true
      tags:
      - agent-versions
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentVersion'
          description: ''
  /api/agents/:
    get:
      operationId: agents_list
      description: |-
        API endpoint for managing AI voice agents.

        list: Get list of agents
        retrieve: Get specific agent details
        create: Create new agent
        update: Update agent
        partial_update: Partially update agent
        destroy: Delete agent (soft delete)
      parameters:
      - in: query
        name: campaign
        schema:
          type: string
          format: uuid
      - in: query
        name: company
        schema:
          type: string
          format: uuid
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          enum:
          - active
          - inactive
          - testing
        description: |-
          * `active` - Active
          * `inactive` - Inactive
          * `testing` - Testing
      tags:
      - agents
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AgentList'
          description: ''
    post:
      operationId: agents_create
      description: |-
        API endpoint for managing AI voice agents.

        list: Get list of agents
        retrieve: Get specific agent details
        create: Create new agent
        update: Update agent
        partial_update: Partially update agent
        destroy: Delete agent (soft delete)
      tags:
      - agents
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Agent'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Agent'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Agent'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
          description: ''
  /api/agents/{id}/:
    get:
      operationId: agents_retrieve
      description: |-
        API endpoint for managing AI voice agents.

        list: Get list of agents
        retrieve: Get specific agent details
        create: Create new agent
        update: Update agent
        partial_update: Partially update agent
