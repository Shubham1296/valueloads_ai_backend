  /api/calls/metrics/:
    get:
      operationId: calls_metrics_retrieve
      description: Get aggregate call metrics
      tags:
      - calls
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Call'
