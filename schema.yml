  /api/campaigns/:
    get:
      operationId: campaigns_list
      description: Returns all campaigns.
      summary: List campaigns
      tags:
      - Campaigns
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Campaign'
          description: ''
    post:
      operationId: campaigns_create
      description: Creates a new campaign. The authenticated employee is recorded
        as the creator.
      summary: Create campaign
      tags:
      - Campaigns
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Campaign'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Campaign'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Campaign'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Campaign'
          description: ''
        '400':
          description: Validation error
  /api/campaigns/{uuid}/:
    get:
      operationId: campaigns_retrieve
      description: Returns a single campaign by UUID.
      summary: Retrieve campaign
      parameters:
      - in: path
        name: uuid
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Campaigns
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Campaign'
          description: ''
        '404':
          description: Not found
    put:
      operationId: campaigns_update
      description: Fully updates a campaign. The authenticated employee is recorded
        as the last updater.
      summary: Update campaign
      parameters:
      - in: path
        name: uuid
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Campaigns
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Campaign'
