      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallCost'
          description: ''
  /api/call-recordings/:
    get:
      operationId: call_recordings_list
      description: |-
        API endpoint for viewing call recordings.
        Read-only access to recording metadata.
      parameters:
      - in: query
        name: call
        schema:
          type: string
          format: uuid
      - in: query
        name: format
        schema:
          type: string
      - in: query
        name: is_deleted
        schema:
          type: boolean
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      tags:
      - call-recordings
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CallRecording'
          description: ''
  /api/call-recordings/{id}/:
    get:
      operationId: call_recordings_retrieve
      description: |-
        API endpoint for viewing call recordings.
        Read-only access to recording metadata.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this call recording.
        required: true
      tags:
      - call-recordings
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallRecording'
          description: ''
  /api/calls/:
    get:
      operationId: calls_list
      description: |-
        API endpoint for managing calls.

        list: Get list of calls
        retrieve: Get specific call details with AI analysis
        create: Create new call record
        update: Update call
      parameters:
      - in: query
        name: agent
        schema:
          type: string
          format: uuid
      - in: query
        name: company
        schema:
          type: string
          format: uuid
      - in: query
        name: lead
        schema:
          type: string
          format: uuid
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - in: query
        name: outcome
        schema:
          type: string
          nullable: true
          enum:
          - answered
          - busy
          - failed
          - no_answer
          - voicemail
        description: |-
          * `answered` - Answered
          * `no_answer` - No Answer
          * `busy` - Busy
          * `failed` - Failed
          * `voicemail` - Voicemail
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          enum:
          - completed
          - failed
          - in_progress
          - scheduled
        description: |-
          * `scheduled` - Scheduled
          * `in_progress` - In Progress
          * `completed` - Completed
          * `failed` - Failed
      tags:
      - calls
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CallList'
          description: ''
    post:
      operationId: calls_create
      description: |-
        API endpoint for managing calls.

        list: Get list of calls
        retrieve: Get specific call details with AI analysis
        create: Create new call record
        update: Update call
      tags:
      - calls
      requestBody:
        content:
