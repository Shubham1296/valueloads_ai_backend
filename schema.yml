      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - in: query
        name: sentiment
        schema:
          type: string
          enum:
          - negative
          - neutral
          - positive
        description: |-
          * `positive` - Positive
          * `neutral` - Neutral
          * `negative` - Negative
      tags:
      - ai-analysis
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AIAnalysis'
          description: ''
  /api/ai-analysis/{id}/:
    get:
