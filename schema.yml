          type: string
          format: uuid
        description: A UUID string identifying this agent.
        required: true
      tags:
      - agents
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
          description: ''
    put:
      operationId: agents_update
      description: |-
        API endpoint for managing AI voice agents.

        list: Get list of agents
        retrieve: Get specific agent details
        create: Create new agent
        update: Update agent
        partial_update: Partially update agent
        destroy: Delete agent (soft delete)
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this agent.
        required: true
      tags:
      - agents
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Agent'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Agent'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Agent'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
          description: ''
    patch:
      operationId: agents_partial_update
      description: |-
        API endpoint for managing AI voice agents.

        list: Get list of agents
        retrieve: Get specific agent details
        create: Create new agent
        update: Update agent
        partial_update: Partially update agent
        destroy: Delete agent (soft delete)
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this agent.
        required: true
      tags:
      - agents
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAgent'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAgent'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAgent'
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
          description: ''
    delete:
      operationId: agents_destroy
      description: |-
        API endpoint for managing AI voice agents.

        list: Get list of agents
        retrieve: Get specific agent details
        create: Create new agent
        update: Update agent
        partial_update: Partially update agent
        destroy: Delete agent (soft delete)
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this agent.
        required: true
      tags:
      - agents
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '204':
          description: No response body
