components:
  schemas:
    AIAnalysis:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        sentiment:
          oneOf:
          - $ref: '#/components/schemas/SentimentEnum'
          - $ref: '#/components/schemas/BlankEnum'
        sentiment_score:
          type: number
          format: double
          nullable: true
          description: -1.0 to 1.0
        key_points:
          description: '["interested in product", "budget concerns"]'
        topics_discussed: {}
        objections_raised: {}
        intent_detected:
          type: string
          description: purchase_intent, information_gathering
          maxLength: 100
        confidence_score:
          type: number
          format: double
          nullable: true
        next_actions:
          description: '["send pricing", "schedule demo"]'
        recommendations:
          type: string
        processed_at:
          type: string
          format: date-time
          readOnly: true
        call:
          type: string
          format: uuid
      required:
      - call
      - id
      - processed_at
    ActionEnum:
      enum:
      - sync_leads
      - push_call_data
      - pull_contacts
      - update_deal
      type: string
      description: |-
        * `sync_leads` - Sync Leads
        * `push_call_data` - Push Call Data
        * `pull_contacts` - Pull Contacts
        * `update_deal` - Update Deal
    Agent:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        voice_config_name:
          type: string
          readOnly: true
        campaign_name:
          type: string
          readOnly: true
        company_name:
          type: string
          readOnly: true
        name:
          type: string
          maxLength: 255
        description:
          type: string
        status:
          $ref: '#/components/schemas/StatusCbfEnum'
        prompt:
          type: string
          description: System prompt / instructions for the AI
        welcome_message:
          type: string
          description: First thing agent says
        fallback_message:
          type: string
          description: When agent doesn't understand
        goodbye_message:
          type: string
        voice_id:
          type: string
          format: uuid
          nullable: true
        max_attempts:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          description: Max call attempts per lead
        retry_delay_minutes:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        max_call_duration_minutes:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        interrupt_threshold:
          type: number
          format: double
          description: How easily user can interrupt (0-1)
        model_name:
          type: string
          maxLength: 100
        temperature:
          type: number
          format: double
        max_tokens:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        knowledge_base_text:
          type: string
          description: Additional context for agent
        knowledge_base_urls:
          description: '["https://..."]'
        enable_human_handoff:
          type: boolean
        handoff_phone_number:
          type: string
          maxLength: 20
        handoff_triggers:
          description: '["angry", "request manager"]'
        total_calls:
          type: integer
          readOnly: true
        successful_calls:
          type: integer
          readOnly: true
        avg_rating:
          type: number
          format: double
          readOnly: true
          nullable: true
        deleted_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        company:
          type: string
          format: uuid
        campaign:
          type: string
          format: uuid
        voice_config:
          type: string
          format: uuid
          nullable: true
        created_by:
          type: string
          format: uuid
          nullable: true
        updated_by:
          type: string
          format: uuid
          nullable: true
      required:
      - avg_rating
      - campaign
      - campaign_name
      - company
      - company_name
      - created_at
      - id
      - name
      - prompt
      - successful_calls
      - total_calls
      - updated_at
      - voice_config_name
      - welcome_message
    AgentList:
      type: object
      description: Lightweight serializer for listing agents
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 255
        status:
          $ref: '#/components/schemas/StatusCbfEnum'
        campaign:
          type: string
          format: uuid
        campaign_name:
          type: string
          readOnly: true
        voice_config_name:
          type: string
          readOnly: true
        total_calls:
          type: integer
