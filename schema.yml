      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Call'
          description: ''
    put:
      operationId: calls_update
      description: |-
        API endpoint for managing calls.

        list: Get list of calls
        retrieve: Get specific call details with AI analysis
        create: Create new call record
        update: Update call
      parameters:
