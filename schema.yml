          description: ''
  /api/auth/company/register/:
    post:
      operationId: auth_company_register_create
      description: Creates a new company and its first admin employee. Returns JWT
        tokens.
      summary: Register company + admin
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyRegister'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CompanyRegister'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CompanyRegister'
        required: true
      responses:
        '201':
          description: Company and tokens returned
  /api/auth/employee/register/:
    post:
      operationId: auth_employee_register_create
      description: Creates a new employee under an existing company identified by
